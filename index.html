<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8" />
<title>桃園 YouBike 站點地圖</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>
html, body { margin:0; height:100%; }
#map { height:100%; }

/* 搜尋 + 篩選列 */
#toolbar {
  position:absolute;
  top:12px;
  left:50%;
  transform:translateX(-50%);
  z-index:1000;
  display:flex;
  gap:8px;
}

#search, #statusFilter {
  padding:8px 12px;
  font-size:14px;
  border-radius:10px;
  border:1px solid #ccc;
  box-shadow:0 2px 6px rgba(0,0,0,.2);
}

/* ===== 官方水滴 Marker ===== */
.marker {
  width:56px;
  height:56px;
  position:relative;
}

.marker svg {
  width:56px;
  height:56px;
}

.marker text {
  fill:#fff;
  font-weight:bold;
  font-size:14px;
  text-anchor:middle;
}

.marker .small {
  font-size:12px;
}

/* 官方色 */
.green  { --c:#7AC943; }
.yellow { --c:#F5A623; }
.red    { --c:#A80000; }

</style>
</head>

<body>
<div id="toolbar">
  <input id="search" placeholder="搜尋站點名稱">
  <select id="statusFilter">
    <option value="">全部</option>
    <option value="green">正常</option>
    <option value="yellow">無車</option>
    <option value="red">無位</option>
  </select>
</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>
const map = L.map("map").setView([24.9936,121.3010],12);
L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png").addTo(map);

let markers = [];
let rawData = [];

/* 狀態判斷 */
function getStatus(borrow, ret) {
  if (ret === 0) return "red";
  if (borrow === 0) return "yellow";
  return "green";
}

/* ⭐ 官方水滴 SVG */
function makeMarkerHTML(borrow, ret, color) {
  return `
  <div class="marker ${color}">
    <svg viewBox="0 0 64 64">
      <path d="M32 2
        C20 2 10 12 10 24
        C10 40 32 62 32 62
        C32 62 54 40 54 24
        C54 12 44 2 32 2Z"
        fill="var(--c)"
        stroke="#fff"
        stroke-width="3"/>
      <text x="32" y="26">${borrow}</text>
      <text x="32" y="42" class="small">${ret}</text>
    </svg>
  </div>`;
}

function render(list) {
  markers.forEach(m=>map.removeLayer(m));
  markers=[];

  list.forEach(s=>{
    const lat=+s.lat, lng=+s.lng;
    if(isNaN(lat)||isNaN(lng))return;

    const borrow=+s.sbi, ret=+s.bemp;
    const status=getStatus(borrow,ret);

    if(filter && status!==filter) return;

    const icon=L.divIcon({
      html:makeMarkerHTML(borrow,ret,status),
      iconSize:[56,56],
      iconAnchor:[28,56]
    });

    markers.push(
      L.marker([lat,lng],{icon})
       .addTo(map)
       .bindPopup(`<b>${s.sna}</b><br>可借:${borrow}<br>可還:${ret}`)
    );
  });
}

/* 載入資料 */
fetch("stations.json")
.then(r=>r.json())
.then(j=>{
  rawData=j.retVal;
  render(rawData);
});

/* 搜尋 */
document.getElementById("search").addEventListener("input",()=>{
  applyFilter();
});

/* 狀態篩選 */
document.getElementById("statusFilter").addEventListener("change",()=>{
  applyFilter();
});

let filter="";
function applyFilter(){
  const kw=document.getElementById("search").value.trim();
  filter=document.getElementById("statusFilter").value;

  render(rawData.filter(s=>
    (!kw||s.sna.includes(kw))
  ));
}
</script>
</body>
</html>
